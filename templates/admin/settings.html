{% extends 'base.html' %}
{% block content %}
<div class="row" style="justify-content:space-between;">
  <h1 class="title">系統設定</h1>
  <a class="btn secondary" href="{{ url_for('admin_logout') }}">登出</a>
</div>

<div class="nav">
  <a href="{{ url_for('admin_dashboard') }}">總覽</a>
  <a href="{{ url_for('admin_employees') }}">員工</a>
  <a href="{{ url_for('admin_prizes') }}">獎品</a>
  <a class="active" href="{{ url_for('admin_settings') }}">設定</a>
  <a href="{{ url_for('admin_qrcode') }}">QR Code</a>
</div>

<div class="card">
  <h2 class="title">活動名稱</h2>
  <p class="muted">會顯示在登入頁與抽獎頁的標題。</p>
  <form method="post" action="{{ url_for('admin_set_event_title') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input name="event_title" value="{{ event_title }}" required>
    <button class="btn" type="submit" style="margin-top:12px;">儲存</button>
  </form>
</div>

<div class="card">
  <h2 class="title">抽獎開關</h2>
  <p class="muted">目前狀態：<strong>{{ '✅ 開放中' if draw_open else '⏸ 已暫停' }}</strong></p>
  <form method="post" action="{{ url_for('admin_toggle_draw') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button class="btn {{ 'danger' if draw_open else 'success' }}" type="submit">
      {{ '暫停抽獎' if draw_open else '開放抽獎' }}
    </button>
  </form>
</div>

<div class="card">
  <h2 class="title">變更管理員密碼</h2>
  <form method="post" action="{{ url_for('admin_change_password') }}" autocomplete="off">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>原密碼</label>
    <input name="old_password" type="password" required>
    <label>新密碼（至少 6 字元）</label>
    <input name="new_password" type="password" required minlength="6">
    <button class="btn" type="submit" style="margin-top:12px;">更新密碼</button>
  </form>
</div>

<div class="card" style="border:1px solid #fecaca;background:#fff7f7;">
  <h2 class="title" style="color:#b91c1c;">危險區：重置所有抽獎紀錄</h2>
  <p class="muted">
    此動作會：清空所有中獎紀錄、把所有獎品狀態回到 AVAILABLE、把員工 has_drawn 歸零。<br>
    只在正式活動前的測試階段使用，正式活動中請勿按。
  </p>
  <form method="post" action="{{ url_for('admin_reset') }}" onsubmit="return confirm('真的要重置？此動作無法復原！')">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>請於下方輸入 <code>RESET</code> 後按送出以確認</label>
    <input name="confirm" placeholder="RESET" required>
    <button class="btn danger" type="submit" style="margin-top:12px;">重置</button>
  </form>
</div>
{% endblock %}
